services:
  - type: web
    name: leaflock-fm
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /fm
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: postgresql://build:build@localhost:5432/build
      - key: APP_URL
        value: https://fm.leaflock.com.au
      - key: NEXT_PUBLIC_APP_URL
        value: https://fm.leaflock.com.au
      - key: FM_PLAYLIST_ID
        value: PLJFdPoHnfyMNIbriwNRh06u2z1Z5vZ7va
      - key: NEXT_PUBLIC_YOUTUBE_PLAYLIST_ID
        value: PLJFdPoHnfyMNIbriwNRh06u2z1Z5vZ7va
      - key: YOUTUBE_API_KEY
        value: AIzaSyD4f1Oc6R9xC58TSiS99BvayekV29rZO2A
      - key: FM_ADMIN_SECRET
        value: leaflock-fm-desk-2026