services:
  - type: web
    name: leaflock-fm
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/ && mkdir -p .next/standalone/data && cp -r data/* .next/standalone/data/ 2>/dev/null || true
    startCommand: cd .next/standalone && node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: DATABASE_URL
        value: postgresql://build:build@localhost:5432/build
      - key: APP_URL
        value: https://fm.leaflock.com.au
      - key: NEXT_PUBLIC_APP_URL
        value: https://fm.leaflock.com.au
      - key: FM_PLAYLIST_ID
        value: PLJFdPoHnfyMNIbriwNRh06u2z1Z5vZ7va
      - key: NEXT_PUBLIC_YOUTUBE_PLAYLIST_ID
        value: PLJFdPoHnfyMNIbriwNRh06u2z1Z5vZ7va
      - key: YOUTUBE_API_KEY
        value: AIzaSyD4f1Oc6R9xC58TSiS99BvayekV29rZO2A
      - key: FM_ADMIN_SECRET
        value: leaflock-fm-desk-2026