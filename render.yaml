services:
  - type: web
    name: leaflock-fm
    runtime: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: PORT
        value: "10000"
      - key: APP_URL
        value: https://fm.leaflock.com.au
      - key: NEXT_PUBLIC_APP_URL
        value: https://fm.leaflock.com.au
      - key: FM_PLAYLIST_ID
        value: PLJFdPoHnfyMNIbriwNRh06u2z1Z5vZ7va
      - key: NEXT_PUBLIC_YOUTUBE_PLAYLIST_ID
        value: PLJFdPoHnfyMNIbriwNRh06u2z1Z5vZ7va
      - key: YOUTUBE_API_KEY
        sync: false
      - key: FM_ADMIN_SECRET
        sync: false