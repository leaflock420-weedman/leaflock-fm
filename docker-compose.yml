services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: leaflock_radio
      POSTGRES_USER: leaflock
      POSTGRES_PASSWORD: leaflock
    ports:
      - "5432:5432"
    volumes:
      - leaflock-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - leaflock-redis:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: leaflock
      MINIO_ROOT_PASSWORD: leaflock-minio-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - leaflock-minio:/data

volumes:
  leaflock-postgres:
  leaflock-redis:
  leaflock-minio:
